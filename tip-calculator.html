<!DOCTYPE html>
<html>
<head>
<title>Tip Calculator (Free) – Calculate Tips Instantly</title>
<meta name="description" content="Calculate tips and split bills instantly with this free tip calculator.">
<meta name="robots" content="index, follow">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<h1>Tip Calculator</h1>

<input id="bill" placeholder="Bill">
<input id="tip" placeholder="Tip %">

<button onclick="calc()">Calculate</button>
<h2 id="r"></h2>

<script>
function calc(){
let t=bill.value*(tip.value/100);
r.innerHTML="Tip: $"+t;
}
</script>
