<!DOCTYPE html>
<html lang="en">
<head>
<title>USD to NOK Converter (Free) - Convert USD to NOK</title>
<meta name="description" content="Convert USD to NOK instantly with this free currency converter calculator.">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="index, follow">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<h1>USD to NOK Converter</h1>
<p>Convert US Dollar (USD) to Norwegian Krone (NOK) using a manual exchange rate.</p>

<label>USD Amount:</label>
<input type="number" id="amount" value="100"><br><br>
<label>Exchange Rate (USD to NOK):</label>
<input type="number" id="rate" value="1.00" step="0.0001"><br><br>

<button onclick="convert()">Convert</button>
<h2 id="result"></h2>

<script>
function convert() {
  const amount = parseFloat(document.getElementById("amount").value) || 0;
  const rate = parseFloat(document.getElementById("rate").value) || 0;
  const converted = amount * rate;
  document.getElementById("result").innerHTML = converted.toFixed(2) + " NOK";
}
</script>
