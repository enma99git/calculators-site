<!DOCTYPE html>
<html>
<body>
<h1>Tax Calculator</h1>

<input id="income" placeholder="Income">
<input id="tax" placeholder="Tax %">

<button onclick="calc()">Calculate</button>

<h2 id="r"></h2>

<script>
function calc(){
let t = income.value * (tax.value / 100);
r.innerHTML = "Tax: $" + t.toFixed(2);
}
</script>
</body>
</html>
